<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海龟汤生成器</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0b0b1e;
  --panel:  #13112e;
  --panel2: #1c1840;
  --border: #3a3568;
  --purple: #a78bfa;
  --accent: #7c3aed;
  --red:    #dc2626;
  --red2:   #f87171;
  --orange: #f97316;
  --teal:   #2dd4bf;
  --yellow: #fbbf24;
  --text:   #e2e0ff;
  --text2:  #8b85cc;
  --px:     'Courier New', 'Lucida Console', monospace;
  --sans:   'Courier New', 'Lucida Console', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--px);
  min-height: 100vh;
  overflow-x: hidden;
}

/* =========== 像素夜城背景 =========== */
.scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.scene .sky {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #05050f 0%, #0d0b28 40%, #1a0a30 65%, #250d3a 80%, #0d0515 100%);
}
.scene .stars { position: absolute; inset: 0; }
.scene .rain  { position: absolute; inset: 0; opacity: 0.2; }

.raindrop {
  position: absolute; width: 2px;
  background: linear-gradient(180deg, transparent, #a78bfa);
  animation: rain linear infinite;
}
@keyframes rain {
  0%   { transform: translateY(-80px); opacity: 0; }
  10%  { opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* 建筑 SVG 撑满底部 */
.scene .city {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  width: 100%; height: 45%;
}

/* 扫描线 */
.scanlines {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
}

/* =========== LAYOUT =========== */
.app {
  position: relative; z-index: 2;
  max-width: 700px;
  margin: 0 auto;
  padding: 0 24px 80px;
  min-height: 100vh;
}

/* =========== HEADER =========== */
.header {
  text-align: center;
  padding: 48px 0 32px;
}
.header-logo {
  font-size: 64px;
  display: block;
  margin-bottom: 16px;
  filter: drop-shadow(0 0 12px #dc2626) drop-shadow(0 0 24px #7c3aed);
  animation: float 2.8s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%      { transform: translateY(-10px) rotate(3deg); }
}
.header-title {
  font-size: 36px;
  letter-spacing: 12px;
  color: #fff;
  text-shadow: 3px 3px 0 var(--red), 6px 6px 0 rgba(220,38,38,0.3), 0 0 30px var(--purple), 0 0 60px rgba(124,58,237,0.4);
  margin-bottom: 14px;
  line-height: 1.5;
}
.header-sub {
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 4px;
}

/* 像素分割线 */
.px-hr {
  display: flex; align-items: center; gap: 8px;
  margin: 20px 0; font-size: 10px; color: var(--text2); letter-spacing: 3px;
}
.px-hr::before, .px-hr::after {
  content: '';  flex: 1; height: 3px;
  background: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 6px, transparent 6px, transparent 12px);
}

/* =========== 像素面板 =========== */
.px-panel {
  background: var(--panel);
  border: 3px solid var(--border);
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
  box-shadow: 0 0 0 1px var(--bg), 5px 5px 0 rgba(0,0,0,0.5), inset 0 1px 0 rgba(167,139,250,0.08);
}
.px-panel::before { content:'▪'; position:absolute; top:-2px; left:-2px; color:var(--purple); font-size:9px; line-height:1; }
.px-panel::after  { content:'▪'; position:absolute; top:-2px; right:-2px; color:var(--purple); font-size:9px; line-height:1; }

.px-panel-title {
  font-size: 14px;
  color: var(--purple);
  letter-spacing: 6px;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 3px solid;
  border-image: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 6px, transparent 6px, transparent 12px) 1;
}

/* =========== 输入框 =========== */
.input-label {
  font-size: 12px;
  color: var(--text2);
  letter-spacing: 3px;
  margin-bottom: 10px;
  display: block;
  line-height: 1.8;
}
.input-label em { color: var(--purple); font-style: normal; }

.kw-row { display: flex; gap: 10px; }
.kw-row input { flex: 1; min-width: 0; }

input[type="text"] {
  background: #080818;
  border: 3px solid var(--border);
  color: var(--text);
  font-family: var(--px);
  font-size: 14px;
  padding: 14px 16px;
  width: 100%;
  outline: none;
  box-shadow: inset 3px 3px 0 rgba(0,0,0,0.5);
  transition: border-color 0.15s;
}
input[type="text"]:focus {
  border-color: var(--purple);
  box-shadow: inset 3px 3px 0 rgba(0,0,0,0.5), 0 0 12px rgba(124,58,237,0.3);
}
input[type="text"]::placeholder { color: rgba(139,133,204,0.35); font-size: 12px; }

.input-group { margin-bottom: 20px; }

/* =========== 像素按钮 =========== */
.px-btn {
  display: block; width: 100%;
  padding: 18px 20px;
  font-family: var(--px);
  font-size: 14px;
  letter-spacing: 4px;
  cursor: pointer; border: none;
  text-align: center;
  transition: transform 0.05s;
  line-height: 1.5;
}

.px-btn-main {
  background: #3d0f0f;
  color: var(--red2);
  border: 4px solid var(--red);
  box-shadow: 0 0 0 1px var(--bg), 5px 5px 0 #150505, 0 0 16px rgba(220,38,38,0.35), inset 0 1px 0 rgba(248,113,113,0.15);
  text-shadow: 0 0 10px var(--red2);
}
.px-btn-main:hover:not(:disabled) {
  background: #5c1515;
  transform: translate(-2px,-2px);
  box-shadow: 0 0 0 1px var(--bg), 7px 7px 0 #150505, 0 0 24px rgba(220,38,38,0.55), inset 0 1px 0 rgba(248,113,113,0.15);
}
.px-btn-main:active:not(:disabled) { transform: translate(3px,3px); box-shadow: 0 0 0 1px var(--bg), 2px 2px 0 #150505; }
.px-btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

.px-btn-back {
  background: var(--panel);
  color: var(--text2);
  border: 3px solid var(--purple);
  font-size: 11px;
  letter-spacing: 3px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.4), 0 0 10px rgba(167,139,250,0.15);
}
.px-btn-back:hover { color: #fff; border-color: #fff; transform: translate(-2px,-2px); }

.px-btn-reset {
  background: transparent; color: var(--text2);
  border: 3px solid var(--border); font-size: 11px;
  letter-spacing: 2px; box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
  margin-top: 14px;
}
.px-btn-reset:hover { color: var(--red2); border-color: var(--red); }

.px-btn-reveal {
  background: #1a0520; color: var(--red2);
  border: 4px solid var(--red); font-size: 15px; letter-spacing: 5px;
  box-shadow: 0 0 0 1px var(--bg), 5px 5px 0 #0d0005, 0 0 20px rgba(220,38,38,0.5), inset 0 1px 0 rgba(248,113,113,0.1);
  text-shadow: 0 0 12px var(--red2);
  padding: 20px;
  animation: revealPulse 2s ease-in-out infinite;
}
@keyframes revealPulse {
  0%,100% { box-shadow: 0 0 0 1px var(--bg), 5px 5px 0 #0d0005, 0 0 20px rgba(220,38,38,0.4); }
  50%      { box-shadow: 0 0 0 1px var(--bg), 5px 5px 0 #0d0005, 0 0 36px rgba(220,38,38,0.75); }
}
.px-btn-reveal:hover { transform: translate(-2px,-2px); }
.px-btn-reveal:active { transform: translate(3px,3px); }

/* =========== 加载 =========== */
.loading-center { text-align: center; padding: 12px 0 16px; }
.cauldron-anim {
  font-size: 52px; display: block; margin-bottom: 14px;
  animation: boil 0.65s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 10px #dc2626);
}
@keyframes boil {
  0%   { transform: scale(1) rotate(-4deg); }
  100% { transform: scale(1.1) rotate(4deg); filter: drop-shadow(0 0 18px #f97316); }
}
.loading-pct {
  font-size: 16px; color: var(--red2); letter-spacing: 3px;
  text-shadow: 0 0 10px var(--red); margin-bottom: 18px;
}
.px-progress-wrap {
  background: #080818; border: 3px solid var(--border); height: 22px; padding: 3px;
  box-shadow: inset 3px 3px 0 rgba(0,0,0,0.5); margin-bottom: 6px;
}
.px-progress-fill {
  height: 100%;
  background: repeating-linear-gradient(90deg, var(--red) 0, var(--red) 10px, var(--orange) 10px, var(--orange) 16px);
  transition: width 0.25s;
  box-shadow: 0 0 8px var(--red);
}
.progress-sub {
  font-size: 9px; color: var(--text2); letter-spacing: 3px; text-align: right;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* =========== 历史列表 =========== */
.history-empty {
  text-align: center; padding: 40px 24px;
  letter-spacing: 2px; line-height: 1;
  background: rgba(13,11,30,0.88);
  border: 3px solid var(--border);
  box-shadow: 0 0 0 1px var(--bg), 5px 5px 0 rgba(0,0,0,0.5);
}
.history-empty .line1 { color: var(--text); font-size: 16px; display: block; margin-bottom: 20px; letter-spacing: 3px; }
.history-empty .line2 { color: var(--purple); font-size: 13px; display: block; letter-spacing: 2px; }
.empty-skull { font-size: 52px; display: block; margin-bottom: 24px; }

.hist-item {
  background: var(--panel2); border: 3px solid var(--border);
  padding: 18px 20px; margin-bottom: 10px;
  cursor: pointer; transition: all 0.1s;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
  position: relative; overflow: hidden;
}
.hist-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
  background: repeating-linear-gradient(180deg, var(--red) 0, var(--red) 5px, transparent 5px, transparent 10px);
}
.hist-item:hover {
  border-color: var(--purple); transform: translate(-2px,-2px);
  box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
}
.hist-title {
  font-size: 14px; color: var(--text); margin-bottom: 12px;
  padding-left: 12px; text-shadow: 0 0 10px var(--purple); letter-spacing: 2px;
}
.hist-tags { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 12px; }
.px-tag {
  font-size: 9px; padding: 4px 10px;
  border: 2px solid var(--border); color: var(--text2); background: #080818;
}
.px-tag.st { border-color: rgba(167,139,250,0.5); color: var(--purple); }

/* =========== 结果页 =========== */
.recipe-text {
  font-size: 11px; color: var(--text2);
  letter-spacing: 1px; line-height: 2.5;
}
.recipe-text .kw { color: var(--teal); }
.recipe-text .st { color: var(--orange); }

.story-title-display {
  font-size: 22px; color: #fff; text-align: center;
  padding: 12px 0 8px; letter-spacing: 6px; line-height: 1.8;
  text-shadow: 3px 3px 0 var(--red), 0 0 20px var(--purple), 0 0 40px rgba(124,58,237,0.4);
}
.story-body {
  font-size: 13px; line-height: 2.6; color: var(--text); letter-spacing: 0.5px;
}

.tangdi-box {
  background: #120518; border: 3px solid rgba(220,38,38,0.45); padding: 20px; margin-top: 14px;
  box-shadow: inset 0 0 24px rgba(220,38,38,0.07), 0 0 14px rgba(220,38,38,0.2);
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* =========== PAGES =========== */
.page { display: none; animation: pageIn 0.3s ease; }
.page.active { display: block; }
@keyframes pageIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.star { position: absolute; background: #fff; image-rendering: pixelated; }

/* =========== 单人模式按钮 =========== */
.px-btn-solo {
  background: #071a1a;
  color: var(--teal);
  border: 4px solid var(--teal);
  box-shadow: 0 0 0 1px var(--bg), 5px 5px 0 #020d0d, 0 0 16px rgba(45,212,191,0.3), inset 0 1px 0 rgba(45,212,191,0.12);
  text-shadow: 0 0 10px var(--teal);
}
.px-btn-solo:hover:not(:disabled) {
  background: #0c2a2a;
  transform: translate(-2px,-2px);
  box-shadow: 0 0 0 1px var(--bg), 7px 7px 0 #020d0d, 0 0 28px rgba(45,212,191,0.5), inset 0 1px 0 rgba(45,212,191,0.12);
}
.px-btn-solo:active:not(:disabled) { transform: translate(3px,3px); box-shadow: 0 0 0 1px var(--bg), 2px 2px 0 #020d0d; }
.px-btn-solo:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-sub { font-size: 10px; letter-spacing: 2px; opacity: 0.65; margin-top: 6px; display: block; }

/* =========== 难度选择 =========== */
.diff-row { display: flex; gap: 12px; }
.diff-opt { flex: 1; }
.diff-opt input[type="radio"] { display: none; }
.diff-opt label {
  display: block; text-align: center; padding: 12px 8px;
  border: 3px solid var(--border); color: var(--text2);
  font-size: 12px; letter-spacing: 3px; cursor: pointer;
  transition: all 0.1s; box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  font-family: var(--px);
}
.diff-opt input[type="radio"]:checked + label {
  border-color: var(--teal); color: var(--teal);
  background: rgba(45,212,191,0.08);
  box-shadow: 3px 3px 0 rgba(0,0,0,0.4), 0 0 10px rgba(45,212,191,0.2);
}
.diff-opt label:hover { border-color: var(--purple); color: var(--purple); }

/* =========== 单人加载 =========== */
.px-progress-fill-teal {
  height: 100%;
  background: repeating-linear-gradient(90deg, var(--teal) 0, var(--teal) 10px, var(--purple) 10px, var(--purple) 16px);
  transition: width 0.3s;
  box-shadow: 0 0 8px var(--teal);
}

/* =========== 案件面板 =========== */
.case-panel {
  background: #080d1a; border: 3px solid rgba(45,212,191,0.35); padding: 20px; margin-bottom: 16px; position: relative;
  box-shadow: 0 0 0 1px var(--bg), 5px 5px 0 rgba(0,0,0,0.5), inset 0 0 20px rgba(45,212,191,0.04);
}
.case-panel::before { content:'▪'; position:absolute; top:-2px; left:-2px; color:var(--teal); font-size:9px; line-height:1; }
.case-panel::after  { content:'▪'; position:absolute; top:-2px; right:-2px; color:var(--teal); font-size:9px; line-height:1; }
.case-label { font-size: 10px; color: var(--teal); letter-spacing: 5px; margin-bottom: 12px; }

/* =========== 对话气泡 =========== */
.chat-wrap {
  display: flex; flex-direction: column; gap: 14px;
  max-height: 400px; overflow-y: auto;
  padding: 4px 2px 4px 0; margin-bottom: 16px;
}
.chat-wrap::-webkit-scrollbar { width: 4px; }
.chat-wrap::-webkit-scrollbar-track { background: #080818; }
.chat-wrap::-webkit-scrollbar-thumb { background: var(--border); }

.msg-ai { display: flex; align-items: flex-start; gap: 10px; }
.msg-ai .msg-icon { font-size: 22px; flex-shrink: 0; margin-top: 4px; filter: drop-shadow(0 0 6px var(--purple)); }
.msg-ai .msg-inner { flex: 1; }
.msg-ai .msg-label { font-size: 9px; letter-spacing: 2px; color: var(--purple); margin-bottom: 5px; }
.msg-ai .msg-bubble {
  background: #1c1840; border: 2px solid rgba(167,139,250,0.35);
  border-left: 4px solid var(--purple); padding: 12px 16px;
  font-size: 13px; line-height: 2; color: var(--text);
  animation: fadeUp 0.3s ease;
}

.msg-player { display: flex; align-items: flex-start; gap: 10px; flex-direction: row-reverse; }
.msg-player .msg-icon { font-size: 22px; flex-shrink: 0; margin-top: 4px; filter: drop-shadow(0 0 6px var(--red)); }
.msg-player .msg-inner { flex: 1; }
.msg-player .msg-label { font-size: 9px; letter-spacing: 2px; color: var(--red2); margin-bottom: 5px; text-align: right; }
.msg-player .msg-bubble {
  background: #1a0808; border: 2px solid rgba(220,38,38,0.35);
  border-right: 4px solid var(--red); padding: 12px 16px;
  font-size: 13px; line-height: 2; color: var(--text);
  animation: fadeUp 0.3s ease;
}

.msg-thinking .msg-bubble { color: var(--text2); font-style: italic; }

/* 输入行 */
.chat-input-row { display: flex; gap: 10px; }
.chat-input-row input { flex: 1; }
.chat-send-btn {
  background: #071a1a; color: var(--teal);
  border: 3px solid var(--teal); font-family: var(--px);
  font-size: 12px; letter-spacing: 2px; padding: 14px 18px;
  cursor: pointer; white-space: nowrap;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  flex-shrink: 0; transition: transform 0.05s;
}
.chat-send-btn:hover:not(:disabled) { background: #0c2828; transform: translate(-1px,-1px); }
.chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 问题计数 */
.q-count-row {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
}
.q-count-label { font-size: 10px; color: var(--text2); letter-spacing: 2px; }
.q-count-num { font-size: 11px; color: var(--teal); letter-spacing: 2px; }

/* 揭晓区 */
.solo-reveal-wrap { margin-top: 14px; }
</style>
</head>
<body>

<!-- 背景场景 -->
<div class="scene">
  <div class="sky"></div>
  <div class="stars" id="stars"></div>
  <div class="rain" id="rain"></div>
  <!-- 像素城市 SVG -->
  <svg class="city" viewBox="0 0 1400 420" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(124,58,237,0.2)"/>
        <stop offset="100%" stop-color="transparent"/>
      </linearGradient>
    </defs>

    <!-- 地面 -->
    <rect x="0" y="402" width="1400" height="18" fill="#07060f"/>
    <rect x="0" y="398" width="1400" height="6" fill="url(#glow)"/>

    <!-- ===== 远景层（暗淡，营造纵深）===== -->
    <rect x="20"  y="250" width="44"  height="152" fill="#0e0c20" opacity=".7"/>
    <rect x="30"  y="264" width="8"   height="8"   fill="#f97316" opacity=".25"/>
    <rect x="44"  y="270" width="8"   height="8"   fill="#a78bfa" opacity=".2"/>

    <rect x="120" y="210" width="55"  height="192" fill="#0c0b1e" opacity=".7"/>
    <rect x="130" y="224" width="10"  height="10"  fill="#2dd4bf" opacity=".2"/>
    <rect x="148" y="240" width="10"  height="10"  fill="#dc2626" opacity=".25"/>

    <rect x="320" y="180" width="70"  height="222" fill="#0e0c20" opacity=".6"/>
    <rect x="332" y="196" width="10"  height="10"  fill="#fbbf24" opacity=".2"/>
    <rect x="350" y="210" width="10"  height="10"  fill="#a78bfa" opacity=".15"/>
    <rect x="368" y="196" width="10"  height="10"  fill="#f97316" opacity=".2"/>

    <rect x="700" y="160" width="80"  height="242" fill="#0c0b1e" opacity=".6"/>
    <rect x="712" y="178" width="12"  height="12"  fill="#dc2626" opacity=".2"/>
    <rect x="732" y="192" width="12"  height="12"  fill="#2dd4bf" opacity=".15"/>
    <rect x="752" y="178" width="12"  height="12"  fill="#fbbf24" opacity=".2"/>

    <rect x="1050" y="200" width="60" height="202" fill="#0e0c20" opacity=".6"/>
    <rect x="1060" y="216" width="10" height="10"  fill="#a78bfa" opacity=".2"/>
    <rect x="1078" y="228" width="10" height="10"  fill="#f97316" opacity=".25"/>

    <rect x="1250" y="230" width="55" height="172" fill="#0c0b1e" opacity=".7"/>
    <rect x="1262" y="246" width="8"  height="8"   fill="#2dd4bf" opacity=".2"/>
    <rect x="1278" y="258" width="8"  height="8"   fill="#dc2626" opacity=".2"/>

    <!-- ===== 主景层 ===== -->

    <!-- 楼A：左边细高楼 -->
    <rect x="60"  y="140" width="52"  height="262" fill="#13112a"/>
    <!-- 单侧霓虹竖条 -->
    <rect x="60"  y="140" width="4"   height="262" fill="#dc2626" opacity=".35"/>
    <!-- 稀疏窗 -->
    <rect x="70"  y="158" width="14"  height="18"  fill="#f97316" opacity=".7"/>
    <rect x="92"  y="164" width="10"  height="12"  fill="#fbbf24" opacity=".4"/>
    <rect x="70"  y="210" width="14"  height="18"  fill="#a78bfa" opacity=".5"/>
    <rect x="92"  y="230" width="10"  height="12"  fill="#2dd4bf" opacity=".35"/>
    <rect x="70"  y="280" width="8"   height="8"   fill="#dc2626" opacity=".6"/>
    <rect x="86"  y="310" width="14"  height="10"  fill="#f97316" opacity=".4"/>
    <!-- 屋顶天线 -->
    <rect x="82"  y="116" width="5"   height="26"  fill="#2a2550"/>

    r.style.cssText = `left:${Math.random()*100}%;height:${30+Math.random()*60}px;animation-duration:${0.5+Math.random()*0.8}s;animation-delay:${Math.random()*2}s`;
    rain.appendChild(r);
  }
}

function getHistory() { try { return JSON.parse(localStorage.getItem('hgt_v2') || '[]'); } catch { return []; } }
function saveHistory(item) {
  const h = getHistory(); h.unshift(item);
  localStorage.setItem('hgt_v2', JSON.stringify(h.slice(0, 50)));
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function goTo(n) {
  if (n === 2) { ['kw1','kw2','kw3','style'].forEach(id => document.getElementById(id).value = ''); }
  if (n === 4) { ['s-kw1','s-kw2','s-kw3','s-style'].forEach(id => document.getElementById(id).value = ''); document.getElementById('d-normal').checked = true; }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page'+n).classList.add('active');
  window.scrollTo(0, 0);
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const h = getHistory();
  if (!h.length) {
    list.innerHTML = `<div class="history-empty"><span class="empty-skull">💀</span><div class="line1">还没有烹饪过海龟汤</div><div class="line2">▶ 点击上方按钮开始创作</div></div>`;
    return;
  }
  list.innerHTML = h.map((item, i) => `
    <div class="hist-item" onclick="viewHistory(${i})">
      <div class="hist-title">${esc(item.title)}</div>
      <div class="hist-tags">
        <span class="px-tag">${esc(item.kw1)}</span>
        <span class="px-tag">${esc(item.kw2)}</span>
        <span class="px-tag">${esc(item.kw3)}</span>
        <span class="px-tag st">${esc(item.style)}</span>
      </div>
    </div>`).join('');
}

function viewHistory(i) { currentResult = getHistory()[i]; renderPage3(currentResult); goTo(3); }

async function submitGenerate() {
  const kw1 = document.getElementById('kw1').value.trim();
  const kw2 = document.getElementById('kw2').value.trim();
  const kw3 = document.getElementById('kw3').value.trim();
  const style = document.getElementById('style').value.trim();
  if (!kw1||!kw2||!kw3||!style) { alert('请填写全部3个关键词和风格！'); return; }

  document.getElementById('submit-area').style.display = 'none';
  document.getElementById('loading-area').style.display = 'block';
  abortController = new AbortController();

  let progress = 0;
  const iv = setInterval(() => {
    if (progress < 88) { progress += Math.random()*7+2; if(progress>88)progress=88; setProgress(Math.floor(progress)); }
  }, 350);

  const SYSTEM_PROMPT = `你是一个擅长创作情境推理游戏（海龟汤）的故事创作者。根据用户提供的3个关键词和1个风格标签，创作一个完整的海龟汤谜题。

创作原则：
1. 一层反转，干净有力，不要多层嵌套
2. 细节一一对应，汤面每个异常汤底都要解释
3. 日常语言误读——同一词/事有不同含义（如"娃娃"=新生儿弟弟）
4. 恐怖来自天真与残酷的反差，不靠血腥超自然
5. 真相可通过"是不是"问题推理
6. 严格按指定风格调整叙事

示例：
标题：真娃娃
【汤面】同学们的娃娃都好逼真啊，可是我不羡慕！第二天上学，我刚把书包放在教室，老师就说今天要出去做志愿活动。放学后，妈妈却疯了。
【汤底】因为我的妈妈刚刚给我生弟，我有更逼真的真人娃娃。我把弟弟装在书包里带去学校，老师说外出志愿活动。外出了一整天，回来打开书包，弟弟已窒息而死，妈妈疯了。

严格按此格式输出，不要额外说明：
标题：[标题]
【汤面】
[内容]
【汤底】
[内容]`;

  try {
    const res = await fetch(KIMI_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${KIMI_API_KEY}` },
      body: JSON.stringify({
        model: 'kimi-k2.6',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: `关键词1：${kw1}\n关键词2：${kw2}\n关键词3：${kw3}\n风格：${style}` }
        ],
        max_tokens: 2000,
        thinking: { type: 'disabled' }
      }),
      signal: abortController.signal
    });
    clearInterval(iv);
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      const errMsg = errBody?.error?.message || res.statusText || '未知错误';
      throw new Error(`API错误 ${res.status}: ${errMsg}`);
    }
    const data = await res.json();
    const text = (data.choices?.[0]?.message?.content || '').trim();
    if (!text) throw new Error('模型返回内容为空，请重试');
    setProgress(100);
    const result = parseResult(text, kw1, kw2, kw3, style);
    currentResult = result; saveHistory(result);
    setTimeout(() => { renderPage3(result); goTo(3); resetLoading(); }, 500);
  } catch(e) {
    clearInterval(iv);
    if (e.name !== 'AbortError') alert('生成失败：' + e.message);
    resetLoading();
  }
}

function setProgress(v) {
  document.getElementById('loading-text').textContent = `海龟汤进度 ${v}%`;
  document.getElementById('progress-bar').style.width = v + '%';
}
function resetLoading() {
  document.getElementById('submit-area').style.display = 'block';
  document.getElementById('loading-area').style.display = 'none';
  setProgress(0);
}
function resetPage2() {
  if (abortController) abortController.abort();
  resetLoading();
  ['kw1','kw2','kw3','style'].forEach(id => document.getElementById(id).value = '');
}
function parseResult(text, kw1, kw2, kw3, style) {
  let title='未知标题', tangmian='', tangdi='';
  const t = text.match(/标题[：:]\s*(.+)/); if (t) title = t[1].trim();
  const m = text.match(/【汤面】\s*([\s\S]*?)(?=【汤底】|$)/); if (m) tangmian = m[1].trim();
  const d = text.match(/【汤底】\s*([\s\S]*?)$/); if (d) tangdi = d[1].trim();
  return { title, tangmian, tangdi, kw1, kw2, kw3, style, createdAt: Date.now() };
}
function renderPage3(r) {
  document.getElementById('recipe-info-text').innerHTML =
    `根据你的配方 <span class="kw">${esc(r.kw1)}</span>、<span class="kw">${esc(r.kw2)}</span>、<span class="kw">${esc(r.kw3)}</span>，用 <span class="st">${esc(r.style)}</span> 小料制作而成的海龟汤`;
  document.getElementById('result-title').textContent = r.title;
  document.getElementById('result-tangmian').textContent = r.tangmian;
  document.getElementById('result-tangdi').textContent = r.tangdi;
  document.getElementById('reveal-btn-wrap').style.display = 'block';
  document.getElementById('tangdi-content').style.display = 'none';
}
function revealTangdi() {
  document.getElementById('reveal-btn-wrap').style.display = 'none';
  document.getElementById('tangdi-content').style.display = 'block';
}
function backToHome() { goTo(1); renderHistory(); }

// =========== 单人模式：进入对话页 ===========
function startSoloGame() {
  questionCount = 0;
  chatHistory = [];

  // 主持人系统 prompt（不同于生成prompt，专门负责答疑引导）
  const diffHint = {
    easy:   '【难度：简单】你可以适度给出额外提示，帮助玩家朝正确方向思考，比如"你的问题很接近了"或"想想一开始发生了什么"。',
    normal: '【难度：普通】只在玩家问到关键节点时给一句模糊提示，如"这个角度值得深入"，其余严格回答是/否/无关。',
    hard:   '【难度：困难】严格只回答「是」「否」「无关」三个字，绝不给任何额外提示或暗示。'
  };
  const sysPrompt = `你是一个海龟汤推理游戏的专业主持人。你已经知道了这道海龟汤的完整真相（汤底），你的任务是引导玩家通过"是非问题"一步步推理出真相。

【汤面（玩家可见的谜题）】
${soloCase.tangmian}

【汤底（你知道的真相，绝对不能直接告诉玩家）】
${soloCase.tangdi}

【你的回答规则】
1. 玩家每次只会问一个"是非问题"，你只能回答：「是」「否」「无关」之一。
2. 在回答后，可以附加一句话（不超过15字）作为引导，但不能直接透露真相。
3. 如果玩家的问题不是是非题、或者太模糊，提醒他换一种问法。
4. 如果玩家已基本猜到真相，可以说「你非常接近了，再想想」。
5. 绝对禁止主动透露汤底内容。
${diffHint[soloCase.difficulty] || diffHint.normal}

回复格式：直接给答案，简洁。例如：「是的。」或「否。」或「无关。这个方向可以再想想。」`;

  chatHistory = [{ role: 'system', content: sysPrompt }];

  // 渲染page5
  document.getElementById('solo-case-meta').innerHTML =
    `配方：<span style="color:var(--teal)">${esc(soloCase.kw1)}</span> · <span style="color:var(--teal)">${esc(soloCase.kw2)}</span> · <span style="color:var(--teal)">${esc(soloCase.kw3)}</span> &nbsp;|&nbsp; 风格：<span style="color:var(--orange)">${esc(soloCase.style)}</span>`;
  document.getElementById('solo-tangmian').textContent = soloCase.tangmian;
  document.getElementById('solo-tangdi').textContent = soloCase.tangdi;
  document.getElementById('solo-reveal-btn-wrap').style.display = 'block';
  document.getElementById('solo-tangdi-content').style.display = 'none';
  document.getElementById('chat-input').value = '';

  updateQCount();
  renderChatMessages();

  // 初始AI开场白
  appendAiMsg('案件已就绪。请用「是非问题」向我提问，我只回答「是」「否」或「无关」。准备好了吗？');

  goTo(5);
}

// =========== 单人模式：发送问题 ===========
async function sendQuestion() {
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;
  if (questionCount >= MAX_QUESTIONS) { alert('已达提问上限！请根据已有线索作出判断，或直接揭晓汤底。'); return; }

  input.value = '';
  input.disabled = true;
  document.getElementById('chat-send-btn').disabled = true;

  appendPlayerMsg(q);
  questionCount++;
  updateQCount();

  chatHistory.push({ role: 'user', content: q });

  // AI 思考占位
  const thinkId = appendThinkingMsg();

  try {
    const res = await fetch(KIMI_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${KIMI_API_KEY}` },
      body: JSON.stringify({
        model: 'kimi-k2.6',
        messages: chatHistory,
        max_tokens: 200,
        thinking: { type: 'disabled' }
      })
    });
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error(`${res.status}: ${errBody?.error?.message || res.statusText}`);
    }
    const data = await res.json();
    const reply = (data.choices?.[0]?.message?.content || '').trim();
    chatHistory.push({ role: 'assistant', content: reply });
    removeThinkingMsg(thinkId);
    appendAiMsg(reply);
  } catch(e) {
    removeThinkingMsg(thinkId);
    appendAiMsg('⚠ 网络异常，请重试。（' + e.message + '）');
  }

  input.disabled = false;
  document.getElementById('chat-send-btn').disabled = false;
  input.focus();
  scrollChatToBottom();
}

// =========== 对话渲染工具函数 ===========
function renderChatMessages() {
  document.getElementById('chat-messages').innerHTML = '';
}

function appendAiMsg(text) {
  const wrap = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'msg-ai';
  el.innerHTML = `<span class="msg-icon">🤖</span><div class="msg-inner"><div class="msg-label">[ AI · 案件主持 ]</div><div class="msg-bubble">${esc(text)}</div></div>`;
  wrap.appendChild(el);
  scrollChatToBottom();
}

function appendPlayerMsg(text) {
  const wrap = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'msg-player';
  el.innerHTML = `<span class="msg-icon">🕵️</span><div class="msg-inner"><div class="msg-label">[ 侦探 · 你 ]</div><div class="msg-bubble">${esc(text)}</div></div>`;
  wrap.appendChild(el);
  scrollChatToBottom();
}

let thinkingIdCounter = 0;
function appendThinkingMsg() {
  const wrap = document.getElementById('chat-messages');
  const id = 'thinking-' + (++thinkingIdCounter);
  const el = document.createElement('div');
  el.className = 'msg-ai msg-thinking';
  el.id = id;
  el.innerHTML = `<span class="msg-icon">🤖</span><div class="msg-inner"><div class="msg-label">[ AI · 案件主持 ]</div><div class="msg-bubble" style="animation: blink 0.8s step-end infinite;">思考中...</div></div>`;
  wrap.appendChild(el);
  scrollChatToBottom();
  return id;
}
function removeThinkingMsg(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollChatToBottom() {
  const wrap = document.getElementById('chat-messages');
  if (wrap) wrap.scrollTop = wrap.scrollHeight;
}

function updateQCount() {
  const pct = Math.min(100, Math.round(questionCount / MAX_QUESTIONS * 100));
  document.getElementById('q-count-display').textContent = `已 提 问 ${questionCount} / ${MAX_QUESTIONS}`;
  document.getElementById('q-progress-bar').style.width = pct + '%';
}

function revealSoloTangdi() {
  document.getElementById('solo-reveal-btn-wrap').style.display = 'none';
  document.getElementById('solo-tangdi-content').style.display = 'block';
  window.scrollTo(0, document.body.scrollHeight);
}

initScene();
renderHistory();
</script>
